imports:
  - ../base.yaml

candidates:
  per_generator_k: 300
  generators:
    # ------------------------------------------------------------------
    # Global signals – broad coverage, acts as fallback for cold users
    # ------------------------------------------------------------------
    - name: global_popularity
      params: {}

    - name: global_temporal_popularity
      params:
        w_incident: 2.0        # directly targets the loss window
        w_post_incident: 1.5   # confirms continued user interest after incident
        w_w30: 1.0
        w_w14: 0.8
        w_trend: 0.6           # rising items are more likely to have been lost
        w_weighted: 0.5
        w_w90: 0.4

    # ------------------------------------------------------------------
    # Personalised profile signals – full history
    # ------------------------------------------------------------------
    - name: user_genre
      params:
        genre_smoothing: 1.0

    - name: user_author
      params:
        author_smoothing: 1.0

    - name: user_language
      params:
        language_smoothing: 0.5
        recency_weight: 0.4

    - name: user_publisher
      params:
        publisher_smoothing: 0.5
        recency_weight: 0.4

    # ------------------------------------------------------------------
    # Personalised profile signals – recent window (last recent_days days)
    # These capture short-term taste drift most relevant to incident period
    # ------------------------------------------------------------------
    - name: user_genre_recent
      params:
        genre_smoothing: 0.5

    - name: user_author_recent
      params:
        author_smoothing: 0.5

    # ------------------------------------------------------------------
    # Collaborative signals – item co-occurrence + SVD matrix factorisation
    # ------------------------------------------------------------------
    - name: item_cooccurrence
      params:
        cooccurrence_days: 90
        seed_days: 45
        max_items_per_user: 30
        top_per_seed: 200

    # SVD collaborative filtering: latent-factor dot-product retrieval.
    # Trains truncated SVD on the full observed user-item matrix and returns
    # top-k items per user by cosine/dot-product score.
    - name: svd_cf
      params:
        n_factors: 64
        read_weight: 2.0
        wishlist_weight: 1.0

ranking:
  # source_weights are used only by the SimpleBlendRanker fallback.
  # When CatBoost is available (default) the ranker learns its own weights
  # automatically from the pseudo-incident training signal.
  source_weights:
    global_popularity: 0.6
    global_temporal_popularity: 1.4
    user_genre: 1.2
    user_author: 1.4
    user_language: 1.0
    user_publisher: 0.8
    user_genre_recent: 1.5
    user_author_recent: 1.6
    item_cooccurrence: 1.8
    svd_cf: 2.0
